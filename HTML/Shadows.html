<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Shadow and Text Shadow</title>
    <style>
      section {
        width: 400px;
        height: 200px;
        margin: 60px auto;
        border: 1px solid black;
        box-shadow:
          red -10px 10px inset,
          blue 10px -10px;
      }
    </style>
  </head>
  <body>
    <section></section>
  </body>
</html>
